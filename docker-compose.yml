services:
  dev:
    build:
      context: .
      target: dev
      args:
        FONTAWESOME_NPM_AUTH_TOKEN: ${FONTAWESOME_NPM_AUTH_TOKEN:-}
    container_name: seating-planner
    ports:
      - "5173:5173"
      - "4173:4173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true
